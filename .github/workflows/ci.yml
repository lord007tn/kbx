name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Node Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
        env:
          KBX_EMBEDDER: hash

      - name: Build
        run: npm run build

      - name: Verify npm package contents
        run: npm run smoke:pack

      - name: Package local platform archive
        run: npm run package:binaries

      - name: Smoke test local platform archive
        run: npm run smoke:artifact

      - name: Generate artifact checksums
        run: npm run release:checksums

      - name: Verify release artifact checksums
        run: npm run release:verify
