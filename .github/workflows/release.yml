name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    name: Verify package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify release tag commit is on main
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main

      - name: Verify package version matches tag
        run: |
          set -euo pipefail
          expected="${GITHUB_REF_NAME#v}"
          actual="$(node -p "require('./package.json').version")"
          if [ "${actual}" != "${expected}" ]; then
            echo "package.json version ${actual} does not match tag ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci
        env:
          ONNXRUNTIME_NODE_INSTALL: skip

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
        env:
          KBX_EMBEDDER: hash

      - name: Build
        run: npm run build

      - name: Verify npm package contents
        run: npm run smoke:pack

      - name: Install smoke test
        run: npm run smoke:install

  publish:
    name: Publish npm package and GitHub release
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci
        env:
          ONNXRUNTIME_NODE_INSTALL: skip

      - name: Build
        run: npm run build

      - name: Verify npm package contents
        run: npm run smoke:pack

      - name: Install smoke test
        run: npm run smoke:install

      - name: Publish to npm
        run: npm publish --access public

      - name: Create GitHub release
        run: npx -y changelogithub@14.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
